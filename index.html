<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video chat</title>
	<link rel="stylesheet" href="css/color-sampler.css">
	<link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="page">
	<div class="filter-wrapper">
		<div class="slider">
			<label for="brightnessController">Brightness</label>
			<input type="range" id="brightnessController" min="10" max="200">
		</div>
		<div class="slider">
		    <label for="contrastController">Contrast</label>
			<input type="range" id="contrastController" min="0" max="200">
		</div>
		<div class="slider">
			<label for="saturateController">Saturate</label>
		    <input type="range" id="saturateController" min="0" max="200">
		</div>
		<div class="slider">
			<label for="sepiaController">Sepia</label>
	        <input type="range" id="sepiaController" min="0" max="100">
		</div>
		<div class="slider">
			<label for="grayscaleController">Grayscale</label>
	        <input type="range" id="grayscaleController" min="0" max="100">
		</div>
		<div class="slider">
			<label for="invertController">Invert</label>
	        <input type="range" id="invertController" min="0" max="100">
		</div>
		<div class="slider">
			<label for="hue_rotateController">Hue Rotate</label>
	        <input type="range" id="hue_rotateController" min="0" max="180">
		</div>
		<div class="slider">
			<label for="blurController">Blur</label>
	        <input type="range" id="blurController" min="0" max="10">
		</div>
	</div>
    <div class="btn-wrapper">
        <button id="startBtn">Start</button>
        <button id="stopBtn">Stop</button>
	    <button id="saveBtn">Save</button>
        <button id="resetBtn">Reset</button>
	    <div class=" bg bg-1" id="bg_1"></div>
		<div class=" bg bg-2" id="bg_2"></div>
		<div class=" bg bg-3" id="bg_3"></div>
	    <div id="chart"></div>
    </div>
    <div id="chroma_overlay"></div>
    <div id="chroma_video_wrapper">
        <video id="chroma_video"></video>
        <div id="chroma_background" class="bg-3"></div>
        <canvas id="chroma_canvas"></canvas>
    </div>
    <div class="color">
        <div id="color_preview"></div>
        <ul id="color_list"></ul>
    </div>
</div>
<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script src="js/jquery.min.js"></script>
<script src="js/color-sampler.js"></script>
<script src="bundle.js"></script>
</body>
</html>
